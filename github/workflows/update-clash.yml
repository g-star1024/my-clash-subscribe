name: Auto Update Clash Config

on:
  schedule:
    # 每8小时运行一次 (UTC时间，可根据需要调整)
    - cron: '0 */8 * * *'
  workflow_dispatch:              # 允许手动触发（方便测试）

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # 允许推送代码到仓库
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install js-yaml

      - name: Run conversion script
        run: node scripts/convert.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clash.yaml
          git diff --cached --quiet || git commit -m "chore: auto update clash.yaml [skip ci]"
          git push
